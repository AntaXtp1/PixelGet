<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PixelGet - Generate high-speed PixelDrain CDN links">
    <meta name="theme-color" content="#9ca3af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PixelGet">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <link rel="apple-touch-icon" href="/logo.jpg">
    <title>PixelGet - PixelDrain CDN Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" width="32" height="32">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <h1>PixelGet</h1>
            </div>
            <p class="subtitle">High-speed CDN link generator</p>
        </header>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Input Section -->
            <section class="panel input-panel">
                <div class="panel-header">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span>Input URLs</span>
                </div>
                <textarea id="input" placeholder="https://pixeldrain.com/u/abc123&#10;https://pixeldrain.com/l/xyz789&#10;..."></textarea>
                <div class="panel-actions">
                    <button id="generateBtn" class="btn-primary">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <polyline points="16 18 22 12 16 6"/>
                            <polyline points="8 6 2 12 8 18"/>
                        </svg>
                        Generate Links
                    </button>
                    <button id="validateBtn" class="btn-secondary">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <polyline points="9 11 12 14 22 4"/>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                        </svg>
                        Validate
                    </button>
                </div>
            </section>

            <!-- Output Section -->
            <section class="panel output-panel">
                <div class="panel-header">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    <span>Generated Links</span>
                    <div class="header-actions">
                        <button id="toggleQrBtn" class="icon-btn" title="Toggle QR Codes">
                            <svg viewBox="0 0 24 24" width="16" height="16">
                                <rect x="3" y="3" width="7" height="7"/>
                                <rect x="14" y="3" width="7" height="7"/>
                                <rect x="3" y="14" width="7" height="7"/>
                                <rect x="14" y="14" width="7" height="7"/>
                            </svg>
                        </button>
                        <button id="exportBtn" class="icon-btn" title="Export to TXT">
                            <svg viewBox="0 0 24 24" width="16" height="16">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="outputContainer" class="output-container">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" width="48" height="48">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <p>No links generated yet</p>
                        <small>Paste PixelDrain URLs and click Generate</small>
                    </div>
                </div>
                <div class="output-actions">
                    <button id="copyAllBtn" class="btn-secondary" disabled>
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        Copy All
                    </button>
                </div>
            </section>
        </div>

        <!-- History Section -->
        <section class="panel history-panel">
            <div class="panel-header">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Recent History</span>
                <button id="clearHistoryBtn" class="icon-btn" title="Clear History">
                    <svg viewBox="0 0 24 24" width="14" height="14">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div id="historyContainer" class="history-container">
                <div class="empty-state small">
                    <p>No history yet</p>
                </div>
            </div>
        </section>

        <!-- Status Bar -->
        <div id="statusBar" class="status-bar hidden">
            <span id="statusText"></span>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <span>PixelGet v1.0</span>
            <span class="separator">|</span>
            <span>by <strong>itsaxt</strong></span>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
